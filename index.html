<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reejan Pariyar — Portfolio</title>
<style>
  :root { --ink:#111111; --paper:#ffffff; --line:#dddddd; --muted:#666666; --hover:#f5f5f5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; color:var(--ink); background:var(--paper); line-height:1.6; font-size:16px; }
  a { color:var(--ink); }
  .wrap { max-width:760px; margin:0 auto; padding:0 24px; }

  header { border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--paper); z-index:50; }
  nav { display:flex; align-items:center; justify-content:space-between; height:60px; max-width:760px; margin:0 auto; padding:0 24px; }
  nav .name { font-weight:700; font-size:17px; letter-spacing:0.5px; }
  nav ul { list-style:none; display:flex; gap:18px; align-items:center; }
  nav ul a { text-decoration:none; font-size:13.5px; color:var(--muted); }
  nav ul a:hover { color:var(--ink); }

  section { padding:54px 0; border-bottom:1px solid var(--line); }
  section h2 { font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:26px; font-weight:600; }

  .hero { padding:64px 0 50px; display:flex; gap:34px; align-items:flex-start; }
  .photo-col { flex-shrink:0; }
  .photo-frame { border:2px solid var(--ink); padding:8px; background:var(--paper); display:inline-block; margin:4px; }
  .photo-frame img { width:150px; height:190px; object-fit:cover; display:block; }
  .photo-empty { width:150px; height:190px; border:2px dashed var(--muted); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; text-align:center; padding:10px; margin:4px; }
  .text-col { flex:1; }
  .hero h1 { font-size:34px; line-height:1.2; margin-bottom:10px; }
  .hero .sub { color:var(--muted); font-size:17px; margin-bottom:16px; }
  .hero .bio { font-size:15px; white-space:pre-wrap; }

  .item { border:1px solid var(--line); margin-bottom:16px; }
  .item-head { padding:18px 20px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .item-head:hover { background:var(--hover); }
  .item-head h3 { font-size:18px; }
  .item-head .meta { font-size:13px; color:var(--muted); margin-top:4px; }
  .toggle { font-size:20px; color:var(--muted); flex-shrink:0; }
  .item-body { display:none; padding:0 20px 20px; }
  .item.open .item-body { display:block; }
  .item.open .toggle { transform:rotate(45deg); }
  .item-body p { font-size:15px; margin-bottom:14px; white-space:pre-wrap; }
  .item-body img.proj-img { max-width:100%; border:1px solid var(--line); margin:6px 0 14px; display:block; }

  .tags { display:flex; flex-wrap:wrap; gap:10px; }
  .tag { border:1px solid var(--line); padding:7px 14px; font-size:14px; display:flex; align-items:center; }

  .contact p { margin-bottom:8px; font-size:15px; }
  .contact .label { color:var(--muted); display:inline-block; width:90px; }

  .admin-only { display:none; }
  body.is-admin .admin-only { display:inline-flex; }
  .del-btn { border:1px solid var(--line); background:var(--paper); width:26px; height:26px; cursor:pointer; font-size:15px; line-height:1; color:var(--muted); flex-shrink:0; }
  .del-btn:hover { background:var(--ink); color:var(--paper); }
  .edit-btn { border:1px solid var(--line); background:var(--paper); padding:3px 10px; cursor:pointer; font-size:12px; color:var(--muted); margin-right:6px; }
  .edit-btn:hover { background:var(--ink); color:var(--paper); }
  .add-btn { border:1px dashed var(--muted); background:var(--paper); color:var(--ink); padding:12px 18px; cursor:pointer; font-size:14px; width:100%; margin-top:4px; }
  .add-btn:hover { background:var(--hover); }
  .small-btn { width:auto !important; }
  .head-actions { display:flex; align-items:center; }

  footer { padding:40px 0; text-align:center; color:var(--muted); font-size:13px; }
  footer button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; text-decoration:underline; }
  footer button:hover { color:var(--ink); }

  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--paper); border:1px solid var(--ink); padding:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal h3 { font-size:18px; margin-bottom:18px; }
  .modal label { display:block; font-size:13px; color:var(--muted); margin:14px 0 5px; }
  .modal input, .modal textarea { width:100%; border:1px solid var(--line); padding:10px; font-size:15px; font-family:inherit; color:var(--ink); }
  .modal textarea { min-height:120px; resize:vertical; }
  .modal input[type=file] { padding:8px; font-size:13px; }
  .modal .row { display:flex; gap:12px; margin-top:22px; }
  .modal .row button { flex:1; padding:11px; font-size:14px; cursor:pointer; border:1px solid var(--ink); }
  .btn-primary { background:var(--ink); color:var(--paper); }
  .btn-primary:hover { background:var(--muted); border-color:var(--muted); }
  .btn-ghost { background:var(--paper); color:var(--ink); }
  .btn-ghost:hover { background:var(--hover); }
  .hint { font-size:12px; color:var(--muted); margin-top:4px; }
  .preview { max-width:120px; border:1px solid var(--line); margin-top:10px; display:none; }

  @media (max-width:640px){ nav ul{display:none;} .hero{flex-direction:column; gap:22px;} .hero h1{font-size:27px;} }
</style>
</head>
<body>

<header>
  <nav>
    <span class="name" id="navName">Reejan Pariyar</span>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#languages">Languages</a></li>
      <li><a href="#certs">Certs</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="wrap">
  <section class="hero" id="about">
    <div class="photo-col">
      <div id="photoWrap"></div>
      <button class="add-btn admin-only small-btn" style="margin-top:8px" onclick="openPhoto()">Edit photo</button>
    </div>
    <div class="text-col">
      <h1 id="heroTitle">Reejan Pariyar</h1>
      <p class="sub" id="heroSub"></p>
      <p class="bio" id="heroBio"></p>
      <button class="add-btn admin-only small-btn" style="margin-top:18px" onclick="editAbout()">Edit intro</button>
    </div>
  </section>

  <section id="experience">
    <h2>Experience</h2>
    <div id="expList"></div>
    <button class="add-btn admin-only" onclick="openExp()">+ Add experience</button>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <div id="projectList"></div>
    <button class="add-btn admin-only" onclick="openProject()">+ Add project</button>
  </section>

  <section id="skills">
    <h2>Skills</h2>
    <div class="tags" id="skillList"></div>
    <button class="add-btn admin-only" style="margin-top:16px" onclick="openSkill()">+ Add skill</button>
  </section>

  <section id="languages">
    <h2>Languages</h2>
    <div class="tags" id="langList"></div>
    <button class="add-btn admin-only" style="margin-top:16px" onclick="openLang()">+ Add language</button>
  </section>

  <section id="certs">
    <h2>Certifications</h2>
    <div id="certList"></div>
    <button class="add-btn admin-only" onclick="openCert()">+ Add certification</button>
  </section>

  <section id="contact" class="contact">
    <h2>Contact</h2>
    <div id="contactBox"></div>
    <button class="add-btn admin-only small-btn" style="margin-top:16px" onclick="editContact()">Edit contact</button>
  </section>
</main>

<footer><p><button id="adminBtn" onclick="toggleAdmin()">Admin</button> <button class="admin-only" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;text-decoration:underline" onclick="openAuth()">Change login</button></p></footer>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script>
// Login details are stored in data.auth and can be changed from the admin panel.
const KEY = "reejan_portfolio_v4";

const DEFAULTS = {
  photo:"profile",
  about:{
    title:"Reejan Pariyar",
    sub:"Computer Science student building toward a career in cloud and cloud security.",
    bio:"I'm a first-year Computer Science student at York St John University, originally from Nepal and now based in York, UK. I'm focused on building a career in cloud computing and cloud security.\n\nRight now I'm studying for my AWS Cloud Practitioner certification and getting hands-on with AWS, Python, Linux and Git. Alongside my studies I work in fast-paced hospitality, which has taught me reliability, discipline and how to perform under pressure, qualities I bring into my technical work."
  },
  experience:[
    { role:"Prep Chef", place:"Cresci Pizzeria, York", dates:"May 2026 – Present",
      desc:"Working in York's only AVPN-certified Neapolitan pizzeria, preparing all fresh ingredients to a high standard for service.\n\n• Prepare a full range of fresh ingredients daily — slicing cheeses, frying vegetables, and preparing meats and sauces.\n• Make classic Italian dishes from scratch following precise recipes.\n• Maintain strict food hygiene and consistency under pressure.\n• Building strong teamwork, reliability and attention to detail." }
  ],
  projects:[],
  skills:["AWS","Python","Git","Linux","HTML/CSS","SQL","PHP","C"],
  languages:["English (IELTS 7.0)","Nepali (native)","Hindi (conversational)"],
  certs:[ { title:"AWS Certified Cloud Practitioner", meta:"Amazon Web Services — In Progress", link:"" } ],
  contact:{ 
    email:"reejan.pariyar.official@gmail.com", 
    location:"York, UK", 
    linkedin:"https://www.linkedin.com/in/reejan-pariyar-b1b865292/", 
    github:"https://github.com/ReejanPariyar" 
  },
  auth:{ user:"reejan", pass:"reejan2026" }
};

let data = load();
migrate();
let tempImg = "";
let editingProject = -1, editingExp = -1;

function load(){ try{ const r=localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){} return JSON.parse(JSON.stringify(DEFAULTS)); }
function migrate(){
  data.experience = data.experience || JSON.parse(JSON.stringify(DEFAULTS.experience));
  data.languages = data.languages || JSON.parse(JSON.stringify(DEFAULTS.languages));
  if(data.about && data.about.bio===undefined) data.about.bio = DEFAULTS.about.bio;
  data.auth = data.auth || JSON.parse(JSON.stringify(DEFAULTS.auth));
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){ showMessage("Could not save — storage may be full. Use smaller images or paste links instead."); } render(); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function linkify(text){ return esc(text).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }

function shrinkImage(file,maxW,cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{ const scale=Math.min(1,maxW/img.width); const w=Math.round(img.width*scale),h=Math.round(img.height*scale); const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); cb(c.toDataURL("image/jpeg",0.8)); }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}

function render(){
  document.getElementById("heroTitle").textContent = data.about.title||"";
  document.getElementById("heroSub").textContent = data.about.sub||"";
  document.getElementById("heroBio").textContent = data.about.bio||"";
  document.getElementById("navName").textContent = data.about.title||"Portfolio";

  document.getElementById("photoWrap").innerHTML = data.photo
    ? `<div class="photo-frame"><img src="${data.photo}" alt="Photo of ${esc(data.about.title)}"></div>`
    : `<div class="photo-empty">No photo yet</div>`;

  document.getElementById("expList").innerHTML = data.experience.map((x,i)=>`
    <div class="item" id="exp-${i}">
      <div class="item-head" onclick="toggleExp(${i})">
        <div><h3>${esc(x.role)}</h3><div class="meta">${esc(x.place)}${x.dates?" · "+esc(x.dates):""}</div></div>
        <div class="head-actions">
          <button class="edit-btn admin-only" onclick="event.stopPropagation();editExp(${i})">Edit</button>
          <button class="del-btn admin-only" onclick="event.stopPropagation();delExp(${i})">×</button>
          <span class="toggle">+</span>
        </div>
      </div>
      <div class="item-body">${x.desc?`<p>${linkify(x.desc)}</p>`:""}</div>
    </div>`).join("") || `<p class="meta">No experience yet.</p>`;

  document.getElementById("projectList").innerHTML = data.projects.map((p,i)=>`
    <div class="item" id="proj-${i}">
      <div class="item-head" onclick="toggleProject(${i})">
        <div><h3>${esc(p.title)}</h3>${p.meta?`<div class="meta">${esc(p.meta)}</div>`:""}</div>
        <div class="head-actions">
          <button class="edit-btn admin-only" onclick="event.stopPropagation();editProject(${i})">Edit</button>
          <button class="del-btn admin-only" onclick="event.stopPropagation();delProject(${i})">×</button>
          <span class="toggle">+</span>
        </div>
      </div>
      <div class="item-body">
        ${p.desc?`<p>${linkify(p.desc)}</p>`:""}
        ${p.img?`<img class="proj-img" src="${p.img}" alt="${esc(p.title)}">`:""}
      </div>
    </div>`).join("") || `<p class="meta">No projects yet.</p>`;

  document.getElementById("skillList").innerHTML = data.skills.map((s,i)=>`
    <span class="tag">${esc(s)}<button class="del-btn admin-only" style="border:none;width:auto;height:auto;margin-left:8px" onclick="delSkill(${i})">×</button></span>
  `).join("") || `<p class="meta">No skills yet.</p>`;

  document.getElementById("langList").innerHTML = data.languages.map((s,i)=>`
    <span class="tag">${esc(s)}<button class="del-btn admin-only" style="border:none;width:auto;height:auto;margin-left:8px" onclick="delLang(${i})">×</button></span>
  `).join("") || `<p class="meta">No languages yet.</p>`;

  document.getElementById("certList").innerHTML = data.certs.map((c,i)=>`
    <div class="item">
      <div class="item-head" style="cursor:default">
        <div><h3>${esc(c.title)}</h3>${c.meta?`<div class="meta">${esc(c.meta)}</div>`:""}
        ${c.link?`<div class="meta" style="margin-top:8px"><a href="${esc(c.link)}" target="_blank" rel="noopener">View certificate →</a></div>`:""}</div>
        <div class="head-actions"><button class="del-btn admin-only" onclick="delCert(${i})">×</button></div>
      </div>
    </div>`).join("") || `<p class="meta">No certifications yet.</p>`;

  const c=data.contact;
  document.getElementById("contactBox").innerHTML = `
    ${c.email?`<p><span class="label">Email</span> <a href="mailto:${esc(c.email)}">${esc(c.email)}</a></p>`:""}
    ${c.location?`<p><span class="label">Location</span> ${esc(c.location)}</p>`:""}
    ${c.linkedin?`<p><span class="label">LinkedIn</span> <a href="${esc(c.linkedin)}" target="_blank" rel="noopener">${esc(c.linkedin)}</a></p>`:""}
    ${c.github?`<p><span class="label">GitHub</span> <a href="${esc(c.github)}" target="_blank" rel="noopener">${esc(c.github)}</a></p>`:""}`;
}

function toggleProject(i){ document.getElementById("proj-"+i).classList.toggle("open"); }
function toggleExp(i){ document.getElementById("exp-"+i).classList.toggle("open"); }

function toggleAdmin(){
  if(document.body.classList.contains("is-admin")){ document.body.classList.remove("is-admin"); document.getElementById("adminBtn").textContent="Admin"; return; }
  openModal(`<h3>Admin login</h3>
    <label>Username</label>
    <input id="f_user" placeholder="Username" onkeydown="if(event.key==='Enter')submitPassword()">
    <label>Password</label>
    <input id="f_pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')submitPassword()">
    <p id="pwErr" class="hint" style="color:#b00020;display:none">Wrong username or password. Try again.</p>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="submitPassword()">Log in</button></div>`);
  setTimeout(()=>{ const el=document.getElementById("f_user"); if(el) el.focus(); },50);
}
function submitPassword(){
  const u=document.getElementById("f_user").value;
  const pw=document.getElementById("f_pw").value;
  if(u===data.auth.user && pw===data.auth.pass){ document.body.classList.add("is-admin"); document.getElementById("adminBtn").textContent="Exit admin"; closeModal(); }
  else { document.getElementById("pwErr").style.display="block"; }
}
function openAuth(){
  openModal(`<h3>Change login details</h3>
    <label>New username</label><input id="a_user" value="${esc(data.auth.user)}">
    <label>New password</label><input id="a_pass" type="password" placeholder="New password">
    <label>Confirm new password</label><input id="a_pass2" type="password" placeholder="Repeat new password">
    <p id="aErr" class="hint" style="color:#b00020;display:none"></p>
    <p class="hint">Remember these — if you forget them you will be locked out of editing on this browser.</p>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveAuth()">Save</button></div>`);
}
function saveAuth(){
  const u=val("a_user"); const p=document.getElementById("a_pass").value; const p2=document.getElementById("a_pass2").value;
  const err=document.getElementById("aErr");
  if(!u){ err.textContent="Username cannot be empty."; err.style.display="block"; return; }
  if(p.length<4){ err.textContent="Password must be at least 4 characters."; err.style.display="block"; return; }
  if(p!==p2){ err.textContent="Passwords do not match."; err.style.display="block"; return; }
  data.auth={ user:u, pass:p }; closeModal(); save(); showMessage("Login updated. Use your new username and password next time.");
}

function openModal(html){ tempImg=""; document.getElementById("modalBody").innerHTML=html; document.getElementById("modalBg").classList.add("open"); }
function closeModal(){ document.getElementById("modalBg").classList.remove("open"); editingProject=-1; editingExp=-1; }
document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target.id==="modalBg") closeModal(); });
let _confirmCb=null;
function showConfirm(msg,cb){ _confirmCb=cb; openModal(`<h3>${msg}</h3><div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="doConfirm()">Delete</button></div>`); }
function doConfirm(){ const cb=_confirmCb; _confirmCb=null; closeModal(); if(cb) cb(); }
function showMessage(msg){ openModal(`<h3>${msg}</h3><div class="row"><button class="btn-primary" onclick="closeModal()">OK</button></div>`); }
function val(id){ return document.getElementById(id).value.trim(); }

/* PHOTO */
function openPhoto(){
  openModal(`<h3>Edit photo</h3>
    <label>Upload a photo (square or portrait works best)</label>
    <input type="file" id="f_photo" accept="image/*" onchange="previewPhoto(event)">
    <img id="photoPreview" class="preview">
    <p class="hint">Resized automatically. Shows inside a black frame.</p>
    <div class="row"><button class="btn-ghost" onclick="removePhoto()">Remove</button><button class="btn-primary" onclick="savePhoto()">Save</button></div>`);
  if(data.photo){ const p=document.getElementById("photoPreview"); p.src=data.photo; p.style.display="block"; tempImg=data.photo; }
}
function previewPhoto(ev){ const f=ev.target.files[0]; if(!f) return; shrinkImage(f,500,d=>{ tempImg=d; const p=document.getElementById("photoPreview"); p.src=d; p.style.display="block"; }); }
function savePhoto(){ data.photo=tempImg; closeModal(); save(); }
function removePhoto(){ data.photo=""; closeModal(); save(); }

/* ABOUT */
function editAbout(){
  openModal(`<h3>Edit intro</h3>
    <label>Name / Title</label><input id="f_title" value="${esc(data.about.title)}">
    <label>Short intro line</label><textarea id="f_sub" style="min-height:60px">${esc(data.about.sub)}</textarea>
    <label>About me (longer bio)</label><textarea id="f_bio" style="min-height:140px">${esc(data.about.bio)}</textarea>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveAbout()">Save</button></div>`);
}
function saveAbout(){ data.about.title=val("f_title"); data.about.sub=val("f_sub"); data.about.bio=val("f_bio"); closeModal(); save(); }

/* EXPERIENCE */
function openExp(){
  editingExp=-1;
  openModal(`<h3>Add experience</h3>
    <label>Role / Job title</label><input id="f_xrole" placeholder="e.g. Prep Chef">
    <label>Place</label><input id="f_xplace" placeholder="e.g. Cresci Pizzeria, York">
    <label>Dates</label><input id="f_xdates" placeholder="e.g. May 2026 – Present">
    <label>Description (paste any links — they become clickable)</label>
    <textarea id="f_xdesc" placeholder="What you do, responsibilities, and skills gained."></textarea>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addExp()">Add</button></div>`);
}
function editExp(i){
  editingExp=i; const x=data.experience[i];
  openModal(`<h3>Edit experience</h3>
    <label>Role / Job title</label><input id="f_xrole" value="${esc(x.role)}">
    <label>Place</label><input id="f_xplace" value="${esc(x.place)}">
    <label>Dates</label><input id="f_xdates" value="${esc(x.dates)}">
    <label>Description</label><textarea id="f_xdesc">${esc(x.desc)}</textarea>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addExp()">Save</button></div>`);
}
function addExp(){
  const r=val("f_xrole"); if(!r){ const e=document.getElementById("f_xrole"); e.style.borderColor="#b00020"; e.focus(); return; }
  const obj={ role:r, place:val("f_xplace"), dates:val("f_xdates"), desc:val("f_xdesc") };
  if(editingExp>=0) data.experience[editingExp]=obj; else data.experience.push(obj);
  closeModal(); save();
}
function delExp(i){ showConfirm("Delete this experience?", ()=>{ data.experience.splice(i,1); save(); }); }

/* PROJECTS */
function openProject(){
  editingProject=-1;
  openModal(`<h3>Add project</h3>
    <label>Title</label><input id="f_ptitle" placeholder="e.g. My AWS Website">
    <label>Tech / tag line</label><input id="f_pmeta" placeholder="e.g. AWS · S3 · Terraform">
    <label>Description (paste any links — they become clickable)</label>
    <textarea id="f_pdesc" placeholder="Describe the project. Paste a GitHub or Google Drive link and it becomes clickable."></textarea>
    <label>Upload one image (optional)</label>
    <input type="file" id="f_pimg" accept="image/*" onchange="previewProj(event)">
    <img id="projPreview" class="preview">
    <p class="hint">For more images, videos or documents, paste their links in the description.</p>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addProject()">Add project</button></div>`);
}
function editProject(i){
  editingProject=i; const p=data.projects[i]; tempImg=p.img||"";
  openModal(`<h3>Edit project</h3>
    <label>Title</label><input id="f_ptitle" value="${esc(p.title)}">
    <label>Tech / tag line</label><input id="f_pmeta" value="${esc(p.meta)}">
    <label>Description</label><textarea id="f_pdesc">${esc(p.desc)}</textarea>
    <label>Replace image (optional)</label>
    <input type="file" id="f_pimg" accept="image/*" onchange="previewProj(event)">
    <img id="projPreview" class="preview" ${p.img?`src="${p.img}" style="display:block"`:""}>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addProject()">Save</button></div>`);
}
function previewProj(ev){ const f=ev.target.files[0]; if(!f) return; shrinkImage(f,800,d=>{ tempImg=d; const p=document.getElementById("projPreview"); p.src=d; p.style.display="block"; }); }
function addProject(){
  const t=val("f_ptitle"); if(!t){ const e=document.getElementById("f_ptitle"); e.style.borderColor="#b00020"; e.focus(); return; }
  const obj={ title:t, meta:val("f_pmeta"), desc:val("f_pdesc"), img:tempImg||"" };
  if(editingProject>=0) data.projects[editingProject]=obj; else data.projects.push(obj);
  closeModal(); save();
}
function delProject(i){ showConfirm("Delete this project?", ()=>{ data.projects.splice(i,1); save(); }); }

/* SKILLS */
function openSkill(){ openModal(`<h3>Add skill</h3><label>Skill name</label><input id="f_skill" placeholder="e.g. Terraform"><div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addSkill()">Add</button></div>`); }
function addSkill(){ const s=val("f_skill"); if(!s) return; data.skills.push(s); closeModal(); save(); }
function delSkill(i){ data.skills.splice(i,1); save(); }

/* LANGUAGES */
function openLang(){ openModal(`<h3>Add language</h3><label>Language</label><input id="f_lang" placeholder="e.g. Spanish (basic)"><div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addLang()">Add</button></div>`); }
function addLang(){ const s=val("f_lang"); if(!s) return; data.languages.push(s); closeModal(); save(); }
function delLang(i){ data.languages.splice(i,1); save(); }

/* CERTS */
function openCert(){
  openModal(`<h3>Add certification</h3>
    <label>Title</label><input id="f_ctitle" placeholder="e.g. AWS Solutions Architect">
    <label>Issuer / status</label><input id="f_cmeta" placeholder="e.g. Amazon Web Services — 2027">
    <label>Link to certificate (optional)</label><input id="f_clink" placeholder="https://...">
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addCert()">Add</button></div>`);
}
function addCert(){ const t=val("f_ctitle"); if(!t){ const e=document.getElementById("f_ctitle"); e.style.borderColor="#b00020"; e.focus(); return; } data.certs.push({ title:t, meta:val("f_cmeta"), link:val("f_clink") }); closeModal(); save(); }
function delCert(i){ showConfirm("Delete this certification?", ()=>{ data.certs.splice(i,1); save(); }); }

/* CONTACT */
function editContact(){
  const c=data.contact;
  openModal(`<h3>Edit contact</h3>
    <label>Email</label><input id="f_email" value="${esc(c.email)}">
    <label>Location</label><input id="f_loc" value="${esc(c.location)}">
    <label>LinkedIn URL</label><input id="f_li" value="${esc(c.linkedin)}">
    <label>GitHub URL</label><input id="f_gh" value="${esc(c.github)}">
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveContact()">Save</button></div>`);
}
function saveContact(){ data.contact={ email:val("f_email"), location:val("f_loc"), linkedin:val("f_li"), github:val("f_gh") }; closeModal(); save(); }

render();
</script>
